---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: slan-cuan-sign
  labels:
    app.kubernetes.io/version: "0.1"
  annotations:
    tekton.dev/categories: Security
    tekton.dev/displayName: "slan-cuan: Sign Artifacts (RADAS)"
    tekton.dev/pipelines.minVersion: "0.50.0"
    tekton.dev/platforms: "linux/amd64"
    tekton.dev/tags: "release,maven,sign,security"
spec:
  description: >-
    Sign Java artifacts using RADAS (Red Hat Artifact Digital Authentication Service).
  params:
    - name: REPO_URL
      description: Pullspec of image containing Maven repository.
      type: string
    - name: SIGNING_KEY
      description: Signing key name for RADAS.
      type: string
    - name: RADAS_CONFIG_SECRET
      description: K8s Secret name containing RADAS config JSON.
      type: string
      default: "radas-config"
    - name: REQUESTER_ID
      description: Requester identity for signing operations.
      type: string
      default: "slan-cuan@redhat.com"
    - name: ZIP_ROOT_PATH
      description: Root of Maven repo tree inside ZIP.
      type: string
      default: "repository"
    - name: PRODUCT_KEY
      description: Product key for metadata.
      type: string
      default: "slan-cuan"
    - name: IGNORE_PATTERNS
      description: Comma-separated regex patterns to ignore during signing.
      type: string
      default: ""
    - name: sourceDataArtifact
      description: Trusted Artifact URI of the extracted artifact directory from slan-cuan-extract.
      type: string
    - name: ociStorage
      description: The OCI repository where the Trusted Artifact is stored.
      type: string
      default: "empty"
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls.
      type: string
      default: ""
    - name: caTrustConfigMapName
      description: The name of the ConfigMap to read CA bundle data from.
      type: string
      default: "trusted-ca"
    - name: caTrustConfigMapKey
      description: The name of the key in the ConfigMap that contains the CA bundle data.
      type: string
      default: "ca-bundle.crt"
    - name: catalogGitUrl
      description: The url to the git repo where the release-service-catalog stepactions are stored.
      type: string
      default: https://github.com/arewm/release-service-catalog.git
    - name: catalogGitRevision
      description: The revision in the catalogGitUrl repo to be used.
      type: string
      default: lightwell-pipeline
  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
      - name: trusted-ca
        mountPath: /mnt/trusted-ca
        readOnly: true
    securityContext:
      runAsNonRoot: true
      readOnlyRootFilesystem: false
    env:
      - name: REQUESTS_CA_BUNDLE
        value: /etc/pki/tls/cert.pem
  steps:
    - name: use-trusted-artifact
      ref:
        resolver: git
        params:
          - name: url
            value: $(params.catalogGitUrl)
          - name: revision
            value: $(params.catalogGitRevision)
          - name: pathInRepo
            value: stepactions/use-trusted-artifact/use-trusted-artifact.yaml
      params:
        - name: workDir
          value: /var/workdir/extracted
        - name: sourceDataArtifact
          value: $(params.sourceDataArtifact)
        - name: orasOptions
          value: $(params.orasOptions)
        - name: caCertPath
          value: /mnt/trusted-ca/$(params.caTrustConfigMapKey)
    - name: run
      image: quay.io/light-castle/slan-cuan:v0.2.0@sha256:caec115db8e741a6b2f37922f3a217375a8f80d07cd8e901f6274d704d523e7e
      args:
        - sign
      env:
        - name: SLAN_CUAN_SIGN_REPO_URL
          value: $(params.REPO_URL)
        - name: SLAN_CUAN_SIGN_REPO_PATH
          value: /var/workdir/extracted
        - name: SLAN_CUAN_SIGN_SIGNING_KEY
          value: $(params.SIGNING_KEY)
        - name: SLAN_CUAN_SIGN_OUTPUT_PATH
          value: /var/workdir/signed
        - name: RADAS_CONFIG_PATH
          value: /radas/config.json
        - name: SLAN_CUAN_SIGN_REQUESTER_ID
          value: $(params.REQUESTER_ID)
        - name: SLAN_CUAN_SIGN_ZIP_ROOT_PATH
          value: $(params.ZIP_ROOT_PATH)
        - name: SLAN_CUAN_SIGN_PRODUCT_KEY
          value: $(params.PRODUCT_KEY)
        - name: SLAN_CUAN_SIGN_IGNORE_PATTERNS
          value: $(params.IGNORE_PATTERNS)
        - name: SLAN_CUAN_TEKTON_RESULTS_DIR
          value: $(step.results)
      volumeMounts:
        - name: radas-config
          mountPath: /radas
          readOnly: true
  volumes:
    - name: workdir
      emptyDir: {}
    - name: radas-config
      secret:
        secretName: $(params.RADAS_CONFIG_SECRET)
    - name: trusted-ca
      configMap:
        name: $(params.caTrustConfigMapName)
        optional: true
